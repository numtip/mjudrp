name: Validate MJU-DRP Registry

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate registry data
        run: node scripts/validate-registry.mjs

      - name: Generate search index and outputs
        run: node scripts/generate-search-index.mjs

      - name: Run tests
        run: npm test

      - name: Upload generated outputs
        uses: actions/upload-artifact@v4
        with:
          name: registry-outputs
          path: dist/

      - name: Fail on validation errors
        if: failure()
        run: echo "CI pipeline failed — check validation and test output above."
