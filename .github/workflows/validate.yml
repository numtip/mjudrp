name: MJU-DRP CI & Release Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Phase 1: Validation
      - name: Validate registry data
        run: node scripts/validate-registry.mjs

      # Phase 2: Generation
      - name: Generate search index and outputs
        run: node scripts/generate-search-index.mjs

      # Phase 3: Testing
      - name: Run tests
        run: npm test

      # Phase 4: Package (only on main, not PRs)
      - name: Generate release notes
        if: github.ref == 'refs/heads/main'
        run: node scripts/generate-release-notes.mjs

      - name: Generate checksums
        if: github.ref == 'refs/heads/main'
        run: node scripts/generate-checksum.mjs

      - name: Validate package
        if: github.ref == 'refs/heads/main'
        run: node scripts/validate-package.mjs

      # Phase 5: Artifacts
      - name: Upload dist outputs
        uses: actions/upload-artifact@v4
        with:
          name: registry-outputs
          path: dist/

      - name: Upload registry package
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: registry-package
          path: release/latest/registry-package/

      # Phase 6: Fail on errors
      - name: Fail on validation errors
        if: failure()
        run: echo "CI pipeline failed — check validation and test output above."
